<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anything and Everything — A Collection</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Dancing+Script:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --sky:        #DCE8F5;
    --sky-deep:   #B9D0E8;
    --night:      #1B2A4A;
    --ink:        #1B2A4A;
    --ink-soft:   #3A5A8C;
    --rose:       #B4778A;
    --rose-soft:  #D9AEBB;
    --gold:       #C9A961;
    --paper:      #FBFCFE;
    --paper-shade:#EEF3F9;
  }

  *{box-sizing:border-box;}

  body{
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(ellipse 900px 700px at 50% -10%, var(--sky-deep) 0%, var(--sky) 55%, #CBDDF0 100%);
    color:var(--ink);
    font-family:'EB Garamond', serif;
    -webkit-font-smoothing:antialiased;
    overflow:hidden;
  }

  @media (prefers-reduced-motion: reduce){
    .sheet{ transition:none !important; }
    .sky-decor svg{ animation:none !important; }
  }

  /* ---------- floating background butterflies ---------- */
  .sky-decor{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:0;
    overflow:hidden;
  }
  .sky-decor svg{
    position:absolute;
    opacity:0.3;
    animation:drift 22s ease-in-out infinite;
  }
  .sky-decor svg:nth-child(1){ top:8%;  left:5%;  width:40px; animation-duration:19s; }
  .sky-decor svg:nth-child(2){ top:18%; right:7%; width:30px; animation-duration:26s; animation-delay:-4s; }
  .sky-decor svg:nth-child(3){ top:78%; left:6%;  width:28px; animation-duration:21s; animation-delay:-9s; }
  .sky-decor svg:nth-child(4){ top:70%; right:6%; width:34px; animation-duration:24s; animation-delay:-13s; }

  @keyframes drift{
    0%,100%{ transform:translate(0,0) rotate(-4deg); }
    50%{ transform:translate(-10px,-18px) rotate(6deg); }
  }

  /* ---------- stage ---------- */
  .stage{
    position:relative;
    z-index:1;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:24px 16px;
    gap:18px;
  }

  .book-wrap{
    position:relative;
    width:min(560px, 92vw);
    height:min(760px, 78vh);
    perspective:2200px;
  }

  /* stacked page-edge illusion behind the book */
  .book-wrap::before{
    content:"";
    position:absolute;
    inset:6px -6px -10px 4px;
    background:linear-gradient(90deg, transparent 0%, transparent 92%, rgba(27,42,74,0.08) 92%, rgba(27,42,74,0.08) 100%),
               repeating-linear-gradient(180deg, rgba(27,42,74,0.05) 0 1px, transparent 1px 4px);
    border-radius:10px;
    z-index:0;
  }

  .book{
    position:relative;
    width:100%;
    height:100%;
    border-radius:10px;
    box-shadow:
      0 2px 0 rgba(255,255,255,0.6) inset,
      0 30px 60px -20px rgba(27,42,74,0.35),
      0 10px 25px -10px rgba(27,42,74,0.25);
    background:var(--paper);
  }

  /* spine shadow along left edge for "open book" feel */
  .book::after{
    content:"";
    position:absolute;
    top:0; bottom:0; left:0;
    width:36px;
    background:linear-gradient(90deg, rgba(27,42,74,0.14), transparent);
    z-index:5;
    pointer-events:none;
    border-radius:10px 0 0 10px;
  }

  .sheet{
    position:absolute;
    inset:0;
    transform-style:preserve-3d;
    transform-origin:left center;
    transform:rotateY(0deg);
    transition:transform 0.85s cubic-bezier(.45,.05,.35,1);
    border-radius:10px;
  }

  .sheet-face{
    position:absolute;
    inset:0;
    backface-visibility:hidden;
    border-radius:10px;
    background:var(--paper);
    overflow:hidden;
  }
  .sheet-face.back{
    transform:rotateY(180deg);
  }

  /* ---------- page frame (injected per page) ---------- */
  .page-frame{
    position:relative;
    width:100%;
    height:100%;
    padding:34px 30px 46px;
    display:flex;
    flex-direction:column;
  }

  .page-content{
    flex:1;
    overflow-y:auto;
    padding-right:6px;
    scrollbar-width:thin;
    scrollbar-color:var(--rose-soft) transparent;
  }
  .page-content::-webkit-scrollbar{ width:5px; }
  .page-content::-webkit-scrollbar-thumb{ background:var(--rose-soft); border-radius:3px; }

  .corner{
    position:absolute;
    opacity:0.55;
    z-index:2;
    pointer-events:none;
  }
  .corner-tl{ top:10px; left:12px; width:30px; }
  .corner-tr{ top:10px; right:12px; width:26px; transform:scaleX(-1); }

  .page-footer{
    position:absolute;
    bottom:14px;
    left:0; right:0;
    text-align:center;
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    font-size:0.85rem;
    color:var(--rose-soft);
    letter-spacing:0.08em;
  }

  /* ---------- title / toc / poem / closing content styles ---------- */
  .p-eyebrow{
    font-family:'Dancing Script', cursive;
    font-size:1.25rem;
    color:var(--rose);
    text-align:center;
    margin:6px 0 4px;
  }
  .p-title{
    font-family:'Cormorant Garamond', serif;
    font-weight:600;
    font-style:italic;
    font-size:clamp(1.7rem, 6vw, 2.5rem);
    text-align:center;
    line-height:1.08;
    margin:0 0 10px;
    color:var(--ink);
  }
  .p-sub{
    text-align:center;
    color:var(--ink-soft);
    font-size:0.95rem;
    letter-spacing:0.06em;
    text-transform:uppercase;
    margin:0 0 18px;
  }
  .p-wreath{
    display:block;
    width:min(230px, 60%);
    margin:6px auto 14px;
  }
  .p-hint{
    text-align:center;
    font-family:'Dancing Script', cursive;
    color:var(--rose-soft);
    font-size:1.05rem;
    margin-top:auto;
  }

  .toc-title{
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    font-weight:500;
    text-align:center;
    color:var(--ink-soft);
    font-size:1.4rem;
    letter-spacing:0.04em;
    margin:4px 0 22px;
  }
  .toc-list{
    list-style:none;
    counter-reset:poem;
    padding:0;
    margin:0;
    display:flex;
    flex-direction:column;
    gap:12px;
  }
  .toc-list li{
    counter-increment:poem;
    display:flex;
    align-items:baseline;
    gap:12px;
    font-size:1rem;
  }
  .toc-list li::before{
    content: counter(poem, decimal-leading-zero);
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    color:var(--rose);
    font-size:0.9rem;
    min-width:1.5em;
  }
  .toc-list .t-page{
    margin-left:auto;
    color:var(--rose-soft);
    font-size:0.85rem;
    font-style:italic;
    font-family:'Cormorant Garamond', serif;
  }

  .poem-num{
    text-align:center;
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    color:var(--rose-soft);
    font-size:0.85rem;
    letter-spacing:0.15em;
    text-transform:uppercase;
    margin:0 0 4px;
  }
  .poem-title{
    font-family:'Cormorant Garamond', serif;
    font-weight:600;
    font-style:italic;
    text-align:center;
    font-size:clamp(1.3rem, 4.2vw, 1.7rem);
    color:var(--ink);
    margin:0 0 20px;
    line-height:1.2;
  }
  .poem-body{
    font-size:1.02rem;
    line-height:1.75;
    color:var(--ink);
  }
  .poem-body p{ margin:0 0 1.05em; }
  .poem-body em{
    font-family:'Dancing Script', cursive;
    font-style:normal;
    font-weight:600;
    color:var(--ink-soft);
    font-size:1.22em;
    line-height:1.5;
    display:inline-block;
  }

  .closing-text{
    text-align:center;
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    font-size:1.2rem;
    color:var(--ink-soft);
    margin-top:14px;
  }

  /* ---------- click zones for flipping ---------- */
  .tap-zone{
    position:absolute;
    top:44px; bottom:44px;
    width:22px;
    z-index:6;
    cursor:pointer;
  }
  .tap-zone.left{ left:2px; }
  .tap-zone.right{ right:2px; }

  /* ---------- controls ---------- */
  .controls{
    position:relative;
    z-index:1;
    display:flex;
    align-items:center;
    gap:22px;
  }
  .nav-btn{
    width:42px;
    height:42px;
    border-radius:50%;
    border:1px solid rgba(27,42,74,0.18);
    background:rgba(255,255,255,0.7);
    color:var(--ink-soft);
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    transition:background 0.2s, transform 0.15s, opacity 0.2s;
    font-size:1.1rem;
    user-select:none;
  }
  .nav-btn:hover:not(:disabled){
    background:#fff;
    transform:translateY(-1px);
  }
  .nav-btn:disabled{
    opacity:0.3;
    cursor:default;
  }
  .page-indicator{
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    color:var(--ink-soft);
    font-size:1rem;
    letter-spacing:0.04em;
    min-width:64px;
    text-align:center;
  }

  .hint-text{
    font-family:'Dancing Script', cursive;
    font-size:1rem;
    color:var(--ink-soft);
    opacity:0.7;
    text-align:center;
    z-index:1;
  }
</style>
</head>

<template class="page" id="tpl-3">
  <p class="poem-num">I.</p>
  <p class="poem-title">The Contract We Couldn't Rewrite</p>
  <div class="poem-body">
    <p>You looked at me and said,</p>
    <p><em>"Things between us have changed."</em></p>
    <p>This stopped being<br>a silly promise,<br>a game we thought<br>we could walk away from.</p>
    <p>It became something<br>with roots.</p>
    <p>Something that grew<br>between our hands<br>while we weren't looking.</p>
    <p><em>"Nyra.<br>My Cariño.<br>My Pokémon Trainer.<br>Let's empty the container<br>we spent a week filling.<br>Let's start over.<br>Let's write a new contract."</em></p>
    <p>So we did.</p>
    <p>Again.</p>
    <p>And again.</p>
    <p>Every page<br>was rewritten<br>with different promises,<br>different rules,<br>different endings<br>we swore we'd keep.</p>
    <p>Yet somehow,<br>every signature<br>led us back<br>to the same place.</p>
    <p>We pulled.</p>
    <p>We pushed.</p>
    <p>We tried to outrun<br>the invisible thread<br>tying your heart<br>to mine.</p>
    <p>Round and round,<br>like two stars<br>caught in the same orbit.</p>
    <p>The contract changed.</p>
    <p>The names changed.</p>
    <p>The promises changed.</p>
    <p>But never us.</p>
    <p>Because no matter<br>how many times<br>we tore the pages apart,</p>
    <p>fate kept gathering<br>the pieces,<br>placing them<br>back into our hands.</p>
    <p>Perhaps<br>we were never meant<br>to escape.</p>
    <p>Perhaps<br>the story<br>was always written<br>between the lines<br>instead of on them.</p>
    <p>Now I understand.</p>
    <p>It was never<br>about writing<br>the perfect contract.</p>
    <p>It was about discovering<br>that every version,<br>every rewrite,<br>every beginning,</p>
    <p>ended with the same truth.</p>
    <p>You are woven<br>into my soul.</p>
    <p>I am woven<br>into yours.</p>
    <p>Not because<br>we signed our names.</p>
    <p>But because<br>every road we<br>chose<br>curved back<br>to each other.</p>
    <p>You're mine.</p>
    <p>I'm yours.</p>
    <p>And this time,</p>
    <p>we don't need<br>another rewrite</p>
  </div>
</template>

<template class="page" id="tpl-4">
  <p class="poem-num">II.</p>
  <p class="poem-title">The Version That Finds You</p>
  <div class="poem-body">
    <p>You called it<br>a reset.</p>
    <p>I called it<br>another beginning<br>wearing a different name.</p>
    <p>We folded our promises<br>into neat little squares,<br>thinking they would stay<br>where we left them.</p>
    <p>But love<br>has restless hands.</p>
    <p>It unfolded every page<br>the moment<br>we looked away.</p>
    <p>You wanted<br>to save us<br>by making us strangers again.</p>
    <p>I wanted<br>to save us<br>by remembering<br>who we were.</p>
    <p>Neither of us<br>was wrong.</p>
    <p>Neither of us<br>was ready.</p>
    <p>We drew new borders,<br>new rules,<br>new reasons<br>to keep our hearts apart.</p>
    <p>Yet somehow,<br>every road<br>learned the shape<br>of your footsteps.</p>
    <p>Every silence<br>still sounded<br>like your voice.</p>
    <p>Maybe we were foolish<br>to believe<br>that a signature<br>could decide<br>what destiny had already written.</p>
    <p>Maybe the contract<br>was never the bond.</p>
    <p>Maybe we were.</p>
    <p>So let the ink fade.</p>
    <p>Let the paper<br>turn to dust.</p>
    <p>Let every promise<br>we once rewrote<br>be carried away<br>by the wind.</p>
    <p>Because there is one truth<br>time has never managed<br>to erase—</p>
    <p>No matter<br>what we call ourselves.</p>
    <p>No matter<br>how many times<br>we begin again.</p>
    <p>No matter<br>how carefully<br>we try to loosen<br>our grip on each other.</p>
    <p>When the world<br>grows quiet,</p>
    <p>when the dust settles,</p>
    <p>when every version<br>of us<br>has had its chance—</p>
    <p>I will still<br>find you.</p>
    <p>And without saying a word,</p>
    <p>you will<br>reach<br>for my hand</p>
    <p>as though<br>you always knew</p>
    <p>this was the only ending</p>
    <p>our story<br>could ever choose.</p>
  </div>
</template>

<template class="page" id="tpl-5">
  <p class="poem-num">III.</p>
  <p class="poem-title">Thank You for Choosing Me</p>
  <div class="poem-body">
    <p><em>"Thank you..."</em></p>
    <p>Thank you for choosing me<br>as your wife.</p>
    <p>For asking me<br>to wear your name.</p>
    <p>For writing<br>"Anything and Everything"<br>at the top of a contract<br>neither of us<br>expected to become<br>so real.</p>
    <p>You answered<br>with a smile<br>that carried<br>more sorrow<br>than happiness.</p>
    <p><em>"I have no regrets, Nyra.<br><br>Not for asking you to marry me.<br><br>Not for signing that contract.<br><br>If I could live it again,<br>I would still choose you.<br><br>Again.<br><br>And again.<br><br>But I can't keep chasing<br>a future<br>I know I cannot have.<br><br>I can't keep reaching<br>for something<br>I can never truly hold."</em></p>
    <p>Your words<br>were gentle.</p>
    <p>But they landed<br>like falling stars—</p>
    <p>beautiful,</p>
    <p>yet impossible<br>to catch.</p>
    <p>Then I whispered,</p>
    <p>"So I'm not the one<br>meant to stand<br>beneath your light?"</p>
    <p>You looked at me<br>as though<br>I'd asked<br>the cruelest question.</p>
    <p><em>"I want you there,<br>every second<br>of every day.<br><br>But I'm not<br>the only light<br>in your sky.<br><br>You have others.<br>Other bonds.<br>Other people<br>who deserve<br>the warmth<br>of your heart.<br><br>What we have...<br>it can't stay<br>like this.<br><br>We can't keep longing<br>for a life<br>that reality<br>won't let us live."</em></p>
    <p>I listened.</p>
    <p>I understood.</p>
    <p>But understanding<br>has never taught<br>a heart<br>how to let go.</p>
    <p>Because if love<br>were measured<br>by possibility,</p>
    <p>we would have ended<br>long ago.</p>
    <p>Instead,</p>
    <p>we keep choosing<br>each other—</p>
    <p>not because<br>it's easy,</p>
    <p>not because<br>it's simple,</p>
    <p>but because<br>out of everyone<br>this world<br>placed before us,</p>
    <p>you still chose me.</p>
    <p>And I will always<br>be grateful</p>
    <p>that for one beautiful moment,</p>
    <p>I was the one</p>
    <p>you called</p>
    <p>your wife.</p>
  </div>
</template>

<template class="page" id="tpl-6">
  <p class="poem-num">IV.</p>
  <p class="poem-title">Unsaid</p>
  <div class="poem-body">
    <p>"I'm the one who gets jealous.<br><br>The one who blushes.<br><br>The one who cries.<br><br>The one who loves too loudly."</p>
    <p>You smiled.</p>
    <p>Not because I was wrong—</p>
    <p>but because you knew.</p>
    <p><em>"And I love you for it, Cariño.<br><br>But somewhere along the way,<br>we stopped holding love<br>and started carrying it.<br><br>It became heavier<br>than either of us expected.<br><br>We kept chasing<br>a tomorrow<br>that reality<br>would never give us.<br><br>And every day<br>we kept talking,<br>because as long as<br>your name appeared<br>on my screen,<br>it felt like<br>the impossible<br>was still within reach.<br><br>But deep down...<br><br>we both knew."</em></p>
    <p>Your words<br>didn't break me.</p>
    <p>They settled<br>inside my heart<br>like rain<br>that never stopped falling.</p>
    <p>Then I told you,</p>
    <p>"I don't want<br>anything left unsaid."</p>
    <p>You nodded.</p>
    <p><em>"Neither do I.<br><br>That's why<br>I wrote this letter.<br><br>There was never<br>a curse between us.<br><br>No spell.<br><br>No chains.<br><br>Only two hearts<br>running after<br>the same dream.<br><br>We've been running<br>for so long,<br>Cariño...<br><br>I think<br>our legs<br>gave out<br>long before<br>we admitted it."</em></p>
    <p>Maybe you're right.</p>
    <p>Maybe there isn't<br>a finish line<br>waiting for us.</p>
    <p>Maybe there never was.</p>
    <p>But if loving you<br>was a journey<br>with no destination,</p>
    <p>then every step<br>was still worth taking.</p>
    <p>Because you taught me<br>that love<br>isn't measured<br>by whether<br>it lasts forever.</p>
    <p>Sometimes,</p>
    <p>it's measured<br>by the way<br>someone changes you<br>simply by staying.</p>
    <p>So if this<br>is where<br>our footsteps stop,</p>
    <p>don't ask me<br>to regret<br>the path.</p>
    <p>Because every road<br>that led me to you</p>
    <p>was worth<br>walking.</p>
    <p>Even if<br>it wasn't meant</p>
    <p>to last forever.</p>
  </div>
</template>

<template class="page" id="tpl-7">
  <p class="poem-num">V.</p>
  <p class="poem-title">Before I Walk Away</p>
  <div class="poem-body">
    <p>I had already made my choice.</p>
    <p>My hand was on the door,<br>my heart was halfway gone.</p>
    <p>I thought leaving<br>would be easier<br>than staying somewhere<br>that kept hurting us both.</p>
    <p>Then you said—</p>
    <p><em>"Cariño...<br><br>I think we need to talk."</em></p>
    <p>And for a moment,</p>
    <p>everything I was trying<br>to let go of</p>
    <p>stood in front of me again.</p>
    <p>You didn't ask me<br>to stay because you were selfish.</p>
    <p>You asked because<br>you understood.</p>
    <p>You saw the distance<br>I was creating.</p>
    <p>You saw the goodbye<br>I was trying to hide.</p>
    <p><em>"What is this between us?"</em></p>
    <p>you asked.</p>
    <p><em>"This bond.<br>This obsession.<br>This thing we both want,<br>but neither of us can truly have."</em></p>
    <p>You called it<br>a dream twisted by reality.</p>
    <p>And maybe it was.</p>
    <p>Because I wanted you.</p>
    <p>More than I should.</p>
    <p>More than I could explain.</p>
    <p>But wanting someone<br>doesn't always mean<br>you are allowed<br>to keep them.</p>
    <p><em>"Let me disappear<br>for a while."</em></p>
    <p>Those were the words<br>I wanted to say.</p>
    <p>Not because I stopped loving you.</p>
    <p>But because I was tired<br>of fighting a battle<br>where my heart<br>kept hoping<br>for something my reality<br>couldn't promise.</p>
    <p>Yet you reached for me.</p>
    <p>You reminded me<br>that leaving<br>doesn't erase love.</p>
    <p>That walking away<br>doesn't mean<br>what we had meant nothing.</p>
    <p>And maybe that was<br>the hardest truth.</p>
    <p>Because if you didn't care,</p>
    <p>leaving would have been easy.</p>
    <p>But you cared.</p>
    <p>I cared.</p>
    <p>And somewhere between<br>holding on<br>and letting go,</p>
    <p>we became two people<br>standing at the edge<br>of the same impossible dream.</p>
    <p>So I stayed a little longer.</p>
    <p>Not because the pain disappeared.</p>
    <p>Not because the impossible<br>became possible.</p>
    <p>But because sometimes,</p>
    <p>before two hearts say goodbye,</p>
    <p>they deserve<br>one honest conversation.</p>
    <p>One last moment<br>where they stop running</p>
    <p>and finally admit—</p>
    <p>"You mattered to me."</p>
    <p>"You still do."</p>
  </div>
</template>

<template class="page" id="tpl-8">
  <p class="poem-num">VI.</p>
  <p class="poem-title">The Ending We Tried to Write</p>
  <div class="poem-body">
    <p>After all the words,</p>
    <p>after all the promises<br>to slow down,</p>
    <p>after all the reasons<br>we gave ourselves<br>to let go—</p>
    <p>you looked at me<br>and said,</p>
    <p><em>"I want all of you."</em></p>
    <p>And somehow,</p>
    <p>those four words<br>carried everything<br>we were too afraid<br>to admit.</p>
    <p>Not a piece.</p>
    <p>Not a moment.</p>
    <p>Not a version of me<br>that was convenient.</p>
    <p>You wanted<br>all the laughter,<br>all the chaos,<br>all the feelings<br>I tried to hide.</p>
    <p>Then you whispered,</p>
    <p><em>"I'll miss seeing your name<br>pop up in game."</em></p>
    <p>Such a simple thing.</p>
    <p>A name appearing<br>on a screen.</p>
    <p>A small notification.</p>
    <p>A tiny moment<br>that shouldn't have mattered<br>as much as it did.</p>
    <p>But it did.</p>
    <p>Because sometimes<br>love is not built<br>from grand promises.</p>
    <p>Sometimes it is built<br>from the little things—</p>
    <p>waiting for a message,</p>
    <p>smiling at a familiar name,</p>
    <p>feeling your day become lighter<br>because someone appeared.</p>
    <p><em>"I never thought<br>I'd be happy<br>to see someone message me."</em></p>
    <p>And there it was.</p>
    <p>The truth<br>we had been avoiding.</p>
    <p>We could write<br>a hundred contracts.</p>
    <p>Create a thousand rules.</p>
    <p>Tell ourselves<br>we needed distance.</p>
    <p>But our hearts<br>never followed<br>the instructions.</p>
    <p>The obsession remained.</p>
    <p>The longing remained.</p>
    <p>The impossible dream<br>still waited between us.</p>
    <p>Maybe we were foolish.</p>
    <p>Maybe we were stubborn.</p>
    <p>Maybe we were two hearts<br>trying to convince ourselves<br>that love could be controlled.</p>
    <p>But in the end,</p>
    <p>after every goodbye,</p>
    <p>after every attempt<br>to walk away,</p>
    <p>we still looked<br>for each other.</p>
    <p>Still waited.</p>
    <p>Still chose.</p>
    <p>The story we tried<br>so hard to end</p>
    <p>became the story<br>we kept rewriting.</p>
    <p>Because no matter<br>how many times<br>we said we should let go,</p>
    <p>somehow...</p>
    <p>we always found<br>another reason</p>
    <p>to hold on.</p>
  </div>
</template>

<template class="page" id="tpl-9">
  <p class="poem-num">VII.</p>
  <p class="poem-title">While I Can</p>
  <div class="poem-body">
    <p>There was a long silence.</p>
    <p>The kind<br>that only exists<br>after two hearts<br>have said<br>everything they were afraid to say.</p>
    <p>Then you laughed,<br>softly.</p>
    <p>Almost as if<br>you were surrendering<br>to a truth<br>you could no longer hide.</p>
    <p><em>"I guess...<br><br>I'm sort of obsessed."</em></p>
    <p>I looked at you,<br>waiting.</p>
    <p>You smiled,<br>the kind of smile<br>that trembles<br>before it breaks.</p>
    <p><em>"You're not the only one<br>who's attached, Cariño.<br><br>I'm addicted too.<br><br>I keep looking for you<br>without realizing it.<br><br>I keep waiting<br>for your messages.<br><br>I keep hoping<br>it's your name<br>that appears.<br><br>I think...<br><br>I think I'm obsessed."</em></p>
    <p>The room<br>grew quiet again.</p>
    <p>Not because<br>there was nothing left to say.</p>
    <p>Because the truth<br>had finally found<br>its voice.</p>
    <p>Then you asked me<br>a question<br>so small,</p>
    <p>yet so impossible.</p>
    <p><em>"Can I just have you...<br><br>All of you...<br><br>While I can?"</em></p>
    <p>Not forever.</p>
    <p>Not with promises<br>we couldn't keep.</p>
    <p>Not with dreams<br>that reality<br>might one day steal.</p>
    <p>Just...</p>
    <p>while you could.</p>
    <p>And my heart<br>betrayed every promise<br>it had made<br>to be careful.</p>
    <p>Because how could I<br>say no</p>
    <p>to someone</p>
    <p>who never asked<br>to own me—</p>
    <p>only to love me</p>
    <p>for as long</p>
    <p>as the universe<br>would allow?</p>
    <p>Perhaps<br>that was always<br>our tragedy.</p>
    <p>Not that we loved<br>too deeply.</p>
    <p>But that we knew</p>
    <p>every borrowed moment</p>
    <p>was precious.</p>
    <p>So if all we have</p>
    <p>is "while we can,"</p>
    <p>then hold my hand,<br>Cariño.</p>
    <p>Until "while"</p>
    <p>becomes another memory</p>
    <p>we'll never stop<br>treasuring.</p>
  </div>
</template>

<template class="page" id="tpl-10">
  <p class="poem-num">VIII.</p>
  <p class="poem-title">Because I Want You</p>
  <div class="poem-body">
    <p>"I want all of you."</p>
    <p>Not the easy parts.</p>
    <p>Not only the moments<br>when everything feels right.</p>
    <p>I want the laughter,<br>the silence,<br>the little habits<br>you don't even notice.</p>
    <p>I want the version of you<br>that you hide<br>when you think<br>you are too much.</p>
    <p>"I always want you."</p>
    <p>Not because<br>I don't know reality.</p>
    <p>Not because<br>I believe love<br>can erase every boundary.</p>
    <p>But because<br>somewhere along the way,</p>
    <p>you became the person<br>my heart searches for<br>without asking permission.</p>
    <p>"I wanted you."</p>
    <p>Before the promises.</p>
    <p>Before the names.</p>
    <p>Before we tried<br>to define what this was.</p>
    <p>I wanted you<br>because something about you<br>felt like a place<br>I had been looking for<br>without knowing.</p>
    <p>And when I asked why,</p>
    <p>the answer was simple.</p>
    <p>"I want you."</p>
    <p>You keep telling me<br>the same thing<br>every day.</p>
    <p>You remind me<br>with your words.</p>
    <p>With your patience.</p>
    <p>With the way<br>you come back.</p>
    <p>You tell me<br>how much you want me<br>until sometimes<br>I forget to doubt it.</p>
    <p>And maybe that is<br>what scares me the most.</p>
    <p>Because wanting someone<br>is easy to say.</p>
    <p>But choosing them<br>again and again—</p>
    <p>that is where<br>love becomes real.</p>
    <p>So here we are.</p>
    <p>Two hearts<br>caught between<br>what we wish for<br>and what we can have.</p>
    <p>Still reaching.</p>
    <p>Still holding on.</p>
    <p>Still saying<br>the words<br>we never get tired of hearing.</p>
    <p>"I want you."</p>
    <p>"I choose you."</p>
    <p>"Still."</p>
  </div>
</template>

<template class="page" id="tpl-11">
  <p class="poem-num">IX.</p>
  <p class="poem-title">Every Second, Every Day</p>
  <div class="poem-body">
    <p>Every second.</p>
    <p>Every day.</p>
    <p>You tell me<br>the same thing.</p>
    <p><em>"I want you."</em></p>
    <p>Not just when<br>the world feels quiet.</p>
    <p>Not just when<br>you miss me.</p>
    <p>But always.</p>
    <p>You say<br>your heart already decided<br>before your mind<br>could find a reason.</p>
    <p><em>"I will always want you."</em></p>
    <p>And maybe that's<br>the most dangerous thing<br>about us.</p>
    <p>Not the distance.</p>
    <p>Not the impossible parts.</p>
    <p>But the way<br>we keep choosing<br>each other<br>even when we know<br>how complicated it is.</p>
    <p>You look at me<br>and remind me—</p>
    <p><em>"That doesn't change the fact<br>that right here,<br>you're mine.<br><br>You're mine.<br><br>Because you're mine."</em></p>
    <p>Those words<br>should scare me.</p>
    <p>Maybe they should<br>make me run.</p>
    <p>But instead,<br>they feel like<br>a place I return to.</p>
    <p>A reminder<br>that somewhere<br>in this messy,<br>beautiful chaos,</p>
    <p>I am wanted.</p>
    <p>I am remembered.</p>
    <p>I am chosen.</p>
    <p>Every day,<br>you say it again.</p>
    <p>Not because<br>you forgot.</p>
    <p>But because<br>you want me to know.</p>
    <p>You want me to hear it.</p>
    <p>You want me to believe it.</p>
    <p>And maybe that's why<br>we keep coming back.</p>
    <p>Because no matter<br>how many times<br>we try to understand<br>what we are,</p>
    <p>there is one thing<br>we never struggle<br>to understand.</p>
    <p>You want me.</p>
    <p>I want you.</p>
    <p>And every day,</p>
    <p>we find another reason</p>
    <p>to stay.</p>
  </div>
</template>

<template class="page" id="tpl-12">
  <p class="poem-num">X.</p>
  <p class="poem-title">The Promise We Keep</p>
  <div class="poem-body">
    <p>We keep choosing.</p>
    <p>Even when we know<br>how complicated it is.</p>
    <p>Even when we tell ourselves<br>to step back.</p>
    <p>Somehow,</p>
    <p>after all the silence,<br>all the doubts,<br>all the attempts to let go,</p>
    <p>it is still my name<br>that stays in your mind.</p>
    <p>You could deny it.</p>
    <p>You could tell yourself<br>that we should follow<br>the rules we created.</p>
    <p>That the contract<br>was meant to protect us.</p>
    <p>But your heart<br>always betrays your words.</p>
    <p>Because maybe<br>you just love me too much<br>to pretend<br>that I mean nothing.</p>
    <p>Maybe somewhere<br>along the way,</p>
    <p>I became the person<br>you search for.</p>
    <p>The name you hope to see.</p>
    <p>The message<br>you wait for.</p>
    <p>And then you stop fighting it.</p>
    <p>You look at everything<br>we tried to control,</p>
    <p>and you say—</p>
    <p><em>"Screw the contract."<br><br>"I'm here."<br><br>"I'm yours."</em></p>
    <p>And I smile,</p>
    <p>because I already knew.</p>
    <p>I knew that no matter<br>how many times<br>we tried to rewrite us,</p>
    <p>we would always return<br>to the same page.</p>
    <p>So I tell you,</p>
    <p><em>"I'm always here for you,<br>my PokéBall."</em></p>
    <p>Not because<br>a contract demands it.</p>
    <p>Not because<br>we are trapped.</p>
    <p>But because<br>I choose you.</p>
    <p>Every time.</p>
    <p>And you answer me softly,</p>
    <p><em>"I'm always here, Cariño.<br><br>It's probably unhealthy."</em></p>
    <p>Maybe it is.</p>
    <p>Maybe we hold on<br>a little too tightly.</p>
    <p>Maybe we feel things<br>a little too deeply.</p>
    <p>But even knowing that,</p>
    <p>you don't walk away.</p>
    <p>You stay.</p>
    <p>Because beneath all the fear,<br>beneath all the reasons<br>we tell ourselves<br>to stop,</p>
    <p>there is still one truth<br>we cannot escape.</p>
    <p>We keep choosing.</p>
    <p>And somehow,</p>
    <p>after everything,</p>
    <p>you are still here.</p>
    <p>And so am I.</p>
  </div>
</template>

<template class="page" id="tpl-13">
  <svg class="p-wreath" viewBox="0 0 260 70" aria-hidden="true" style="height:auto;">
    <use href="#rose-icon" x="0" y="5" width="42" height="42"/>
    <use href="#butterfly-icon" x="100" y="0" width="60" height="42"/>
    <use href="#rose-icon" x="215" y="5" width="42" height="42"/>
  </svg>
  <p class="closing-text">end of this collection</p>
  <p class="p-hint" style="margin-top:16px;">tap ← to read again</p>
</template>

<script>
(function(){
  const templates = Array.from(document.querySelectorAll('template.page'));
  const pages = templates.map(t => t.innerHTML.trim());
  const total = pages.length;
  let current = 0;
  let animating = false;

  const sheet = document.getElementById('sheet');
  const faceFront = document.getElementById('face-front');
  const faceBack = document.getElementById('face-back');
  const indicator = document.getElementById('page-indicator');
  const btnPrev = document.getElementById('btn-prev');
  const btnNext = document.getElementById('btn-next');
  const zoneLeft = document.getElementById('zone-left');
  const zoneRight = document.getElementById('zone-right');

  function wrap(idx){
    const showCorners = idx !== 0 && idx !== total - 1;
    const cornerHtml = showCorners
      ? '<svg class="corner corner-tl" viewBox="0 0 60 60"><use href="#rose-icon"/></svg>' +
        '<svg class="corner corner-tr" viewBox="0 0 40 30"><use href="#butterfly-icon"/></svg>'
      : '';
    const footer = (idx === 0 || idx === total - 1) ? '' :
      '<div class="page-footer">' + (idx + 1) + ' / ' + total + '</div>';
    return '<div class="page-frame">' + cornerHtml +
           '<div class="page-content">' + pages[idx] + '</div>' +
           footer + '</div>';
  }

  function updateControls(){
    indicator.textContent = (current + 1) + ' / ' + total;
    btnPrev.disabled = current === 0;
    btnNext.disabled = current === total - 1;
  }

  function init(){
    faceFront.innerHTML = wrap(current);
    updateControls();
  }

  function go(direction){
    if(animating) return;
    const nextIndex = current + direction;
    if(nextIndex < 0 || nextIndex >= total) return;
    animating = true;

    faceBack.innerHTML = wrap(nextIndex);
    faceBack.style.transform = direction === 1 ? 'rotateY(180deg)' : 'rotateY(-180deg)';

    sheet.style.transition = 'none';
    sheet.style.transform = 'rotateY(0deg)';
    // force reflow so the transition re-applies cleanly
    void sheet.offsetWidth;
    sheet.style.transition = 'transform 0.85s cubic-bezier(.45,.05,.35,1)';

    requestAnimationFrame(function(){
      sheet.style.transform = direction === 1 ? 'rotateY(-180deg)' : 'rotateY(180deg)';
    });

    function onEnd(e){
      if(e.propertyName !== 'transform') return;
      sheet.removeEventListener('transitionend', onEnd);
      current = nextIndex;
      faceFront.innerHTML = wrap(current);
      sheet.style.transition = 'none';
      sheet.style.transform = 'rotateY(0deg)';
      void sheet.offsetWidth;
      updateControls();
      animating = false;
    }
    sheet.addEventListener('transitionend', onEnd);
  }

  btnPrev.addEventListener('click', function(){ go(-1); });
  btnNext.addEventListener('click', function(){ go(1); });
  zoneLeft.addEventListener('click', function(){ go(-1); });
  zoneRight.addEventListener('click', function(){ go(1); });

  document.addEventListener('keydown', function(e){
    if(e.key === 'ArrowRight') go(1);
    if(e.key === 'ArrowLeft') go(-1);
  });

  // basic swipe support
  let touchStartX = null;
  let touchStartY = null;
  document.getElementById('book').addEventListener('touchstart', function(e){
    touchStartX = e.changedTouches[0].clientX;
    touchStartY = e.changedTouches[0].clientY;
  }, {passive:true});
  document.getElementById('book').addEventListener('touchend', function(e){
    if(touchStartX === null) return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    if(Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 2){
      go(dx < 0 ? 1 : -1);
    }
    touchStartX = null;
    touchStartY = null;
  }, {passive:true});

  init();
})();
</script>
